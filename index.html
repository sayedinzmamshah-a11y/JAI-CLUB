<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

background:linear-gradient(180deg,#2b1055,#000);

align-items:center;
height:100vh;
}

.container{
width:90%;
max-width:400px;

color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}
</style>
</head>

<body>

<div class="container">
<h1>JAI CLUB</h1>

<input type="text" placeholder="Phone Number">

</html>
